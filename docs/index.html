<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunday Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="table-texture" aria-hidden="true"></div>

  <header class="app-header">
    <div class="app-header-inner">
      <h1>Sunday Menu<span class="title-flourish">.</span></h1>
      <p class="app-tagline">Pick two. We'll handle the rest.</p>
    </div>
    <nav class="tabs">
      <button class="tab-button" data-view="menu">Menu</button>
      <button class="tab-button" data-view="grocery">Grocery List</button>
      <button class="tab-button" data-view="addRecipe">Add Recipe</button>
      <button class="tab-button" data-view="settings">Settings</button>
    </nav>
  </header>

  <main id="app">
    <p id="status">Loading…</p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
